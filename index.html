<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAM Fam Overlay Glow v7</title>

<style>
  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* 🚢 MAIN WIDGET */
  .widget {
    width: 310px;
    height: 310px;
    position: absolute;
    top: 20px;
    right: 20px;
    border-radius: 16px;
    overflow: hidden;
    color: white;
    transition: background 0.5s ease;

    /* ✨ DEFAULT GLOW */
    box-shadow: 0 0 12px rgba(0,0,0,0.6);
  }

  /* ✨ ANIMATED GLOW LAYER */
  .widget::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 2px;
    background: transparent;
    pointer-events: none;
    animation: pulse 3s infinite;
  }

  @keyframes pulse {
    0% { filter: blur(2px); opacity: 0.6; }
    50% { filter: blur(5px); opacity: 1; }
    100% { filter: blur(2px); opacity: 0.6; }
  }

  .content {
    height: 310px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    text-align: center;
  }

  /* TEXT */
  .title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 4px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.85);
  }

  .subtitle {
    font-size: 11px;
    opacity: 0.95;
    margin-bottom: 5px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.85);
  }

  /* QR */
  #qrcode img {
    width: 130px;
    height: 130px;
    background: white;
    padding: 6px;
    border-radius: 12px;
  }

  /* VIDEO CARD */
  .videoCard {
    width: 95%;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .videoCard img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
  }

  .videoTitle {
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px 0 8px;
  }

  .videoTime {
    font-size: 11px;
    opacity: 0.85;
    padding: 0 8px 6px 8px;
  }

  .fade {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.98);}
    to {opacity: 1; transform: scale(1);}
  }
</style>
</head>

<body>

<div class="widget" id="widget">
  <div class="content fade" id="slide">

    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>

    <div id="qrcode"></div>
    <div id="video"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="config.js"></script>

<script>

/* 🔄 SLIDES */
const slides = [
  { type: "qr", name: "facebook", platform: "facebook", title: "📘 FACEBOOK", subtitle: "Join the KAM Fam Community" },
  { type: "qr", name: "instagram", platform: "instagram", title: "📸 INSTAGRAM", subtitle: "Behind the Scenes + Cruise Life" },
  { type: "qr", name: "youtube", platform: "youtube", title: "🎬 YOUTUBE", subtitle: "New Videos Every Week" },
  { type: "qr", name: "klub", platform: "klub", title: "💬 KAM KLUB", subtitle: "Members Only Live Shows" },
  { type: "qr", name: "merch", platform: "merch", title: "🛍️ MERCH SHOP", subtitle: "Grab your KAM Fam gear" },
  { type: "video", platform: "video1", videoIndex: 0, title: "🎬 THIS WEEK", subtitle: "Featured Episode" },
  { type: "video", platform: "video2", videoIndex: 1, title: "🎬 THIS WEEK", subtitle: "Bonus Episode" }
];

let index = 0;

/* 🌊 CRUISE + PLATFORM GLOW */
function setTheme(platform) {

  const widget = document.getElementById("widget");

  const themes = {
    facebook: "linear-gradient(135deg, #1877F2, #0b2f6b)",
    instagram: "linear-gradient(135deg, #f58529, #dd2a7b, #8134af)",
    youtube: "linear-gradient(135deg, #ff0000, #5a0000)",
    klub: "linear-gradient(135deg, #d4af37, #7a5a00)",
    merch: "linear-gradient(135deg, #00c853, #00695c)",
    video1: "linear-gradient(135deg, #0b1320, #1c2c44)",
    video2: "linear-gradient(135deg, #0b1320, #1c2c44)"
  };

  widget.style.background = themes[platform];

  /* ✨ GLOW COLOR MATCH */
  const glow = {
    facebook: "#1877F2",
    instagram: "#dd2a7b",
    youtube: "#ff0000",
    klub: "#d4af37",
    merch: "#00c853",
    video1: "#4da3ff",
    video2: "#4da3ff"
  };

  widget.style.boxShadow = `0 0 18px ${glow[platform]}66`;
}

/* 📺 LOAD SLIDE */
function loadSlide(i) {

  const slide = slides[i];

  document.getElementById("title").innerText = slide.title;
  document.getElementById("subtitle").innerText = slide.subtitle;

  setTheme(slide.platform);

  const qr = document.getElementById("qrcode");
  const vid = document.getElementById("video");

  qr.innerHTML = "";
  vid.innerHTML = "";

  /* QR */
  if (slide.type === "qr") {
    QRCode.toCanvas(CONFIG.social[slide.name], { width: 130 }, function (err, canvas) {
      if (!err) qr.appendChild(canvas);
    });
  }

  /* VIDEO */
  if (slide.type === "video") {

    const v = CONFIG.videos[slide.videoIndex];

    const card = document.createElement("div");
    card.className = "videoCard";

    card.innerHTML = `
      <img src="${v.thumb}" />
      <div class="videoTitle">${v.title}</div>
      <div class="videoTime">${v.time}</div>
    `;

    vid.appendChild(card);
  }

  const box = document.getElementById("slide");
  box.classList.remove("fade");
  void box.offsetWidth;
  box.classList.add("fade");
}

/* 🔁 ROTATION */
function nextSlide() {
  index = (index + 1) % slides.length;
  loadSlide(index);
}

loadSlide(index);
setInterval(nextSlide, 9000);

</script>

</body>
</html>
