<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KAM Fam Compact Overlay</title>

<style>
  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* 🚢 COMPACT WIDGET */
  .widget {
    width: 285px;
    height: 285px;
    position: absolute;
    top: 20px;
    right: 20px;
    border-radius: 16px;
    overflow: hidden;
    color: white;
    transition: background 0.5s ease;
    box-shadow: 0 0 18px rgba(0,0,0,0.6);
  }

  /* ✨ CONTENT */
  .content {
    height: 285px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px;
    text-align: center;
  }

  /* 🔤 BIGGER TEXT (priority focus) */
  .title {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.85);
  }

  .subtitle {
    font-size: 13px;
    opacity: 0.98;
    margin-bottom: 5px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.85);
  }

  /* 📲 SMALLER QR */
  #qrcode img {
    width: 110px;
    height: 110px;
    background: white;
    padding: 6px;
    border-radius: 12px;
  }

  /* 🎬 VIDEO CARD */
  .videoCard {
    width: 95%;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    position: relative;
  }

  .videoCard img {
    width: 100%;
    height: 115px;
    object-fit: cover;
    display: block;
  }

  .videoTitle {
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px 0 8px;
  }

  .videoTime {
    font-size: 11px;
    opacity: 0.85;
    padding: 0 8px 6px 8px;
  }

  /* 🚨 BADGE */
  .badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: rgba(255, 215, 0, 0.95);
    color: black;
    font-size: 10px;
    font-weight: bold;
    padding: 3px 6px;
    border-radius: 6px;
  }

  /* ✨ FADE */
  .fade {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.98);}
    to {opacity: 1; transform: scale(1);}
  }
</style>
</head>

<body>

<div class="widget" id="widget">
  <div class="content fade" id="slide">

    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>

    <div id="qrcode"></div>
    <div id="video"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="config.js"></script>

<script>

/* 🔄 SLIDES */
const slides = [
  { type: "qr", name: "facebook", platform: "facebook", title: "📘 FACEBOOK", subtitle: "Join the KAM Fam Community" },
  { type: "qr", name: "instagram", platform: "instagram", title: "📸 INSTAGRAM", subtitle: "Behind the Scenes + Cruise Life" },
  { type: "qr", name: "youtube", platform: "youtube", title: "🎬 YOUTUBE", subtitle: "New Videos Every Week" },
  { type: "qr", name: "klub", platform: "klub", title: "💬 KAM KLUB", subtitle: "Members Only Live Shows" },
  { type: "qr", name: "merch", platform: "merch", title: "🛍️ MERCH SHOP", subtitle: "Grab your KAM Fam gear" },
  { type: "video", platform: "video1", videoIndex: 0, title: "🎬 FEATURED", subtitle: "This Week" },
  { type: "video", platform: "video2", videoIndex: 1, title: "🎬 BONUS", subtitle: "This Week" }
];

/* 🌊 THEMES + GLOW */
function setTheme(platform) {

  const widget = document.getElementById("widget");

  const themes = {
    facebook: "linear-gradient(135deg, #1877F2, #0b2f6b)",
    instagram: "linear-gradient(135deg, #f58529, #dd2a7b, #8134af)",
    youtube: "linear-gradient(135deg, #ff0000, #5a0000)",
    klub: "linear-gradient(135deg, #d4af37, #7a5a00)",
    merch: "linear-gradient(135deg, #00c853, #00695c)",
    video1: "linear-gradient(135deg, #0b1320, #1c2c44)",
    video2: "linear-gradient(135deg, #0b1320, #1c2c44)"
  };

  widget.style.background = themes[platform];

  const glow = {
    facebook: "#1877F2",
    instagram: "#dd2a7b",
    youtube: "#ff0000",
    klub: "#d4af37",
    merch: "#00c853",
    video1: "#4da3ff",
    video2: "#4da3ff"
  };

  widget.style.boxShadow = `0 0 18px ${glow[platform]}66`;
}

/* 📺 LOAD */
let index = 0;

function loadSlide(i) {

  const slide = slides[i];

  document.getElementById("title").innerText = slide.title;
  document.getElementById("subtitle").innerText = slide.subtitle;

  setTheme(slide.platform);

  const qr = document.getElementById("qrcode");
  const vid = document.getElementById("video");

  qr.innerHTML = "";
  vid.innerHTML = "";

  /* QR */
  if (slide.type === "qr") {
    QRCode.toCanvas(CONFIG.social[slide.name], { width: 110 }, function (err, canvas) {
      if (!err) qr.appendChild(canvas);
    });
  }

  /* VIDEO */
  if (slide.type === "video") {

    const v = CONFIG.videos[slide.videoIndex];

    const card = document.createElement("div");
    card.className = "videoCard";

    card.innerHTML = `
      <div class="badge">COMING THIS WEEK</div>
      <img src="${v.thumb}" />
      <div class="videoTitle">${v.title}</div>
      <div class="videoTime">${v.time}</div>
    `;

    vid.appendChild(card);
  }

  const box = document.getElementById("slide");
  box.classList.remove("fade");
  void box.offsetWidth;
  box.classList.add("fade");
}

/* 🔁 ROTATION */
function nextSlide() {
  index = (index + 1) % slides.length;
  loadSlide(index);
}

loadSlide(index);
setInterval(nextSlide, 9000);

</script>

</body>
</html>
